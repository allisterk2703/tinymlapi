apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: tinymlapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: flask
          image: ghcr.io/${GITHUB_USERNAME}/tinymlapi-flask:latest
          ports:
            - containerPort: 5000
