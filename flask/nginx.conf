worker_processes 1;
daemon off;

events { worker_connections 1024; }

http {
    server {
        listen 5000;

        location / {
            proxy_pass http://unix:/tmp/gunicorn.sock;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
